services:
  traefik:
    image: traefik:latest
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
    ports:
      - "80:80"
      - "8080:8080"  # Traefik dashboard
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
    networks:
      - agachadeats-network

  postgres:
    image: postgres:alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - agachadeats-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    ports:
      - "5672:5672"
      - "15672:15672"  # RabbitMQ management UI
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - agachadeats-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    # TODO: remove this port in prod
    ports:
      - "6379:6379"
    networks:
      - agachadeats-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  core-api:
    build:
      context: ./apps/orders-api
      dockerfile: Dockerfile
      target: dev
    volumes:
      - ./apps/orders-api:/app
      - core-api-node-modules:/app/node_modules
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      PORT: ${CORE_API_PORT}
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      RABBITMQ_URL: amqp://${RABBITMQ_DEFAULT_USER}:${RABBITMQ_DEFAULT_PASS}@rabbitmq:5672
      AWS_REGION: ${AWS_REGION}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_S3_BUCKET_NAME: ${AWS_BUCKET_NAME}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - agachadeats-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.core-api.rule=Host(`api.localhost`)"
      - "traefik.http.services.core-api.loadbalancer.server.port=${CORE_API_PORT}"

  tracking-api:
    build:
      context: ./apps/tracking-api
      dockerfile: Dockerfile
      target: dev
    ports:
      - "8086:8080"
    volumes:
      - ./apps/tracking-api:/app
      - tracking-api-gopath:/go
    environment:
      APP_ENV: development
      PORT: ${TRACKING_API_PORT}
      REDIS_URL: redis://${REDIS_HOST}:${REDIS_PORT}
      RABBITMQ_URL: amqp://${RABBITMQ_DEFAULT_USER}:${RABBITMQ_DEFAULT_PASS}@rabbitmq:5672
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - agachadeats-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.tracking-api.rule=Host(`tracking.localhost`)"
      - "traefik.http.services.tracking-api.loadbalancer.server.port=${TRACKING_API_PORT}"

  client:
    image: nginx:alpine
    volumes:
      - ./apps/client:/usr/share/nginx/html:ro
      - ./apps/client/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "3001:80"
    networks:
      - agachadeats-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.client.rule=Host(`client.localhost`)"
      - "traefik.http.services.client.loadbalancer.server.port=80"

networks:
  agachadeats-network:
    driver: bridge

volumes:
  postgres-data:
  rabbitmq-data:
  core-api-node-modules:
  tracking-api-gopath: