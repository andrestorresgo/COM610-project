services:
  traefik:
    image: traefik:latest
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
    ports:
      - "80:80"
      - "8080:8080"  # Traefik dashboard
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
    networks:
      - agachadeats-network
    # Traefik does NOT depend on postgres or rabbitmq — it only needs the app
    # containers to register themselves via Docker labels, which happens when
    # they start. Declaring DB deps here was incorrect and is removed.

  postgres:
    image: postgres:alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - agachadeats-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    ports:
      - "5672:5672"
      - "15672:15672"  # RabbitMQ management UI
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - agachadeats-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    # No ports exposed to the host — only internal services need Redis.
    # Expose 6379 locally only if you need redis-cli access during development.
    ports:
      - "6379:6379"
    networks:
      - agachadeats-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  core-api:
    build:
      context: ./apps/orders-api
      dockerfile: Dockerfile
      target: dev  # Build only up to the dev stage; skip the production bundle step.
    volumes:
      # Mount local source so Bun's --hot flag picks up file changes immediately.
      - ./apps/orders-api:/app
      # Named volume to protect node_modules installed during the image build.
      # Without this, the source mount above would shadow /app/node_modules,
      # leaving the container with no packages at runtime.
      - core-api-node-modules:/app/node_modules
    environment:
      NODE_ENV: development
      PORT: ${CORE_API_PORT}
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      RABBITMQ_URL: amqp://${RABBITMQ_DEFAULT_USER}:${RABBITMQ_DEFAULT_PASS}@rabbitmq:5672
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - agachadeats-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.core-api.rule=Host(`api.localhost`)"
      - "traefik.http.services.core-api.loadbalancer.server.port=${CORE_API_PORT}"
    # No restart policy in dev: if the process crashes you want to see it
    # stay dead so the error is obvious, not silently restarted.

  tracking-api:
    build:
      context: ./apps/tracking-api
      dockerfile: Dockerfile
      target: dev  # Build only up to the dev stage; skip the production binary compilation.
    volumes:
      # Mount local source so Air detects file changes and recompiles.
      - ./apps/tracking-api:/app
      # Named volume to protect the Go module cache and Air binary installed
      # during the image build from being shadowed by the source mount.
      - tracking-api-gopath:/go
    environment:
      APP_ENV: development
      PORT: ${TRACKING_API_PORT}
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://${RABBITMQ_DEFAULT_USER}:${RABBITMQ_DEFAULT_PASS}@rabbitmq:5672
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - agachadeats-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.tracking-api.rule=Host(`tracking.localhost`)"
      - "traefik.http.services.tracking-api.loadbalancer.server.port=${TRACKING_API_PORT}"
    # No restart policy in dev (see note in core-api above).

networks:
  agachadeats-network:
    driver: bridge

volumes:
  postgres-data:
  rabbitmq-data:
  # These named volumes shadow the respective directories inside the containers
  # so that the host source-code mounts don't wipe installed packages/binaries.
  core-api-node-modules:
  tracking-api-gopath: