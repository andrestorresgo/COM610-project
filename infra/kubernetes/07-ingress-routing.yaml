apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: platform-ingress
  namespace: delivery-platform
spec:
  # THE MODERN FIX: Explicitly binds to K3s's built-in Traefik engine natively
  ingressClassName: traefik
  rules:
    # 1. Routing rule for the Core API (Hono)
    - host: api.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: hono-core-service
                port:
                  number: 3000
    # 2. Routing rule for the Tracking API (Go WebSockets)
    - host: tracking.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: go-tracking-service
                port:
                  number: 8080