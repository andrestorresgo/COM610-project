apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-cache
  namespace: delivery-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      # CRITICAL: Pins the cache to your master infrastructure node (server-241)
      nodeSelector:
        topology.kubernetes.io/role: master-infra
      containers:
        - name: redis
          image: redis:7-alpine
          # Enforce persistence logging to the attached volume
          command: ["redis-server", "--appendonly", "yes"]
          ports:
            - containerPort: 6379
          volumeMounts:
            - name: redis-storage
              mountPath: /data
          # Resiliency: Ensure cache port is active before accepting connections
          readinessProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: redis-storage
          persistentVolumeClaim:
            claimName: redis-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: delivery-platform
spec:
  selector:
    app: redis
  ports:
    - protocol: TCP
      port: 6379
      targetPort: 6379
  type: ClusterIP