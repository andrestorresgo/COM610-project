apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: hono-core-hpa
  namespace: delivery-platform
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: hono-core-test
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: go-tracking-hpa
  namespace: delivery-platform
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: go-tracking-test
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50