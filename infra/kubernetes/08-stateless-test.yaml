apiVersion: apps/v1
kind: Deployment
metadata:
  name: hono-core-test
  namespace: delivery-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hono-core
  template:
    metadata:
      labels:
        app: hono-core
    spec:
      # CRITICAL: Forces this stateless container onto your worker compute node (server-242)
      nodeSelector:
        topology.kubernetes.io/role: worker-compute
      containers:
        - name: echo-server
          image: paulbouwer/hello-kubernetes:1.10
          ports:
            - containerPort: 8080
          env:
            - name: MESSAGE
              value: "Hello from Hono Core API Mock on Server-242!"
          # ADD THIS: Gives the HPA a baseline threshold to measure scaling percentages
          resources:
            requests:
              cpu: "100m"     # 100 milli-cores (10% of a single CPU core)
            limits:
              cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: hono-core-service # Must match the exact name used in your Ingress manifest
  namespace: delivery-platform
spec:
  selector:
    app: hono-core
  ports:
    - protocol: TCP
      port: 3000       # The external port Traefik is looking for
      targetPort: 8080 # The internal port the container listens on
  type: ClusterIP
---
